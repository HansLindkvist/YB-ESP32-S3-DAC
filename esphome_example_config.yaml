# ESPHome Configuration Example for YB-ESP32-S3-DAC with Custom Component
# This configuration demonstrates how to use the YB Audio Player component

esphome:
  name: yb-esp32-s3-dac-audio
  friendly_name: YB ESP32 S3 DAC Audio Player
  platform: ESP32
  board: esp32s3box

# WiFi configuration
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "YB-Audio-Fallback"
    password: !secret ap_password

# Enable logging
logger:
  level: INFO

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  password: !secret ota_password

# I2C configuration (for TLV320DAC3101 communication)
i2c:
  id: i2c_dac
  sda: GPIO8
  scl: GPIO9
  frequency: 100kHz

# I2S Audio configuration (for audio data streaming)
i2s_audio:
  id: i2s_dac
  i2s_lrclk_pin: GPIO6
  i2s_bclk_pin: GPIO5
  i2s_dout_pin: GPIO7
  i2s_mclk_pin: GPIO4
  bits_per_sample: 16

# Custom component for YB-ESP32-S3-DAC
externally_defined_custom_components:
  - source: github://HansLindkvist/YB-ESP32-S3-DAC/esphome_custom_component
    components: [yb_audio_player]

# YB Audio Player component
yb_audio_player:
  i2c_id: i2c_dac
  i2s_id: i2s_dac

# Button to play test sound
button:
  - platform: template
    name: "Play Test Sound"
    on_press:
      then:
        - logger.log: "Test sound button pressed"

# Switch to control audio playback
switch:
  - platform: template
    name: "Audio Output Enable"
    turn_on_action:
      - logger.log: "Audio output enabled"
    turn_off_action:
      - logger.log: "Audio output disabled"
